name: CROSS New Token Announcer

on:
  workflow_dispatch:     # untuk test manual
  schedule:
    - cron: '*/15 * * * *'   # tiap 15 menit

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Announcer Script
        run: node new-token-announcer.js
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Commit updated known-tokens.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add known-tokens.json
          git diff --staged --quiet || git commit -m "Update known-tokens.json [auto]"
          git push
        continue-on-error: true
